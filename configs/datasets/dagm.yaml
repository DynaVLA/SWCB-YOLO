# DAGM 2007 weakly-supervised texture-defect benchmark (cross-domain evaluation, paper Table 8).
# Public dataset: https://hci.iwr.uni-heidelberg.de/content/weakly-supervised-learning-industrial-optical-inspection
# Retain the released equal-sized Train/Test partitions within each texture
# class. Reserve 10% of Train for validation with random seed 42 and report Test.
# Treat all defect regions as one detection class and use 640x640 input.
path: ./datasets/DAGM
train: images/train
val: images/val
test: images/test
nc: 1
names:
  0: defect
