# DTU/NordTank wind-turbine-blade inspection benchmark (paper Table 8).
# Source study: https://doi.org/10.3390/en12040676
# The paper retains the released 70:15:15 train/validation/test partition from
# the public detection annotations, treats all annotated visible surface damage
# as one detection class, and uses 640x640 input. Do not reshuffle the split.
path: ./datasets/DTU-Blade
train: images/train
val: images/val
test: images/test
nc: 1
names:
  0: damage
