# NEU-DET surface-defect benchmark (cross-domain evaluation, paper Table 8).
# Public dataset: http://faculty.neu.edu.cn/songkechen/zh_CN/zhym/263269/list/
# Retain the released 1,440-image training and 360-image test partition. Reserve
# a class-stratified 10% of the released training images for validation with
# random seed 42; report metrics on the 360-image test set. Use 640x640 input.
path: ./datasets/NEU-DET
train: images/train
val: images/val
test: images/test
nc: 6
names:
  0: crazing
  1: inclusion
  2: patches
  3: pitted_surface
  4: rolled-in_scale
  5: scratches
